version: "3.9"

services:
  server:
    image: node:20
    working_dir: /workspace
    volumes:
      - ..:/workspace
    command: sh -c "corepack enable && pnpm install && pnpm --filter @web-scada/server dev"
    ports:
      - "3001:3001"

  client:
    image: node:20
    working_dir: /workspace
    volumes:
      - ..:/workspace
    command: sh -c "corepack enable && pnpm install && pnpm --filter @web-scada/client dev -- --host 0.0.0.0"
    ports:
      - "3000:3000"
    depends_on:
      - server